# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception
#
# .github/workflows/ci.yml — six-stage CI pipeline per Constitution
# Principle IX. Mirrors scripts/ci.sh exactly: each step calls into
# the same dispatch so divergence between local and remote runs is
# impossible (FR-021).
#
# Container strategy (research §2 + .docker/): every job that needs
# LLVM/MLIR/CIRCT runs inside ghcr.io/<owner>/nsl-nslc:dev, which is
# built and pushed by .github/workflows/publish-images.yml from the
# pins in cmake/deps.lock. Local dev uses scripts/docker-build.sh
# against the same Dockerfiles + pins (Principle V — identical
# input → identical environment).

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write   # for the wired-but-empty sticky comment
  # No `packages: read` — the dev container at
  # `ghcr.io/koyamanx/nsl-nslc:dev` MUST be set to public visibility
  # on ghcr.io. Public packages pull anonymously, so the workflow
  # needs no token scope for them and the per-job `credentials:`
  # block is omitted from each `container:` directive.

env:
  # Documents the canonical container image. NOT consumed by
  # `container.image` (GitHub Actions does not allow `env` context
  # there — see comment on each job's container directive). The
  # literal lowercase form `ghcr.io/koyamanx/nsl-nslc:dev` is
  # hardcoded in each `container.image` instead. This env entry exists
  # for run-context shell steps that may want the image string.
  #
  # Floating `:dev` tag — bumped atomically by publish-images.yml when
  # any docker-stack input changes (.docker/** or cmake/deps.lock).
  NSLC_IMAGE: ghcr.io/koyamanx/nsl-nslc:dev

jobs:

  # --------------------------------------------------------------------------
  # Stage 1: build-matrix (4 cells: Debug × Release × {gcc, clang})
  #
  # The container provides clang/gcc/cmake/ninja/lld/ccache/python3
  # and the prebuilt /opt/llvm + /opt/circt staged by
  # publish-images.yml's nsl-llvm-mlir + nsl-circt jobs. No on-the-fly
  # LLVM/MLIR/CIRCT build in this loop.
  # --------------------------------------------------------------------------
  build-matrix:
    name: build-matrix (${{ matrix.build_type }}, ${{ matrix.compiler }})
    runs-on: ubuntu-22.04                # research §7: pinned, never `latest`
    container:
      # Hardcoded literal — GitHub Actions does NOT support the `env`
      # context in `jobs.<id>.container.image` (only github / needs /
      # strategy / matrix / vars / inputs are allowed there). Forks
      # should update both this string and the registry namespace in
      # `.github/workflows/publish-images.yml`. The package MUST be
      # set to public visibility on ghcr.io after the first
      # publish-images run; with public visibility the pull happens
      # anonymously and no `credentials:` block is required.
      image: ghcr.io/koyamanx/nsl-nslc:dev
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        compiler: [gcc, clang]
    steps:
      - name: Checkout (full depth for git describe)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run stage 1 via scripts/ci.sh
        run: ./scripts/ci.sh build-matrix ${{ matrix.build_type }} ${{ matrix.compiler }}

  # --------------------------------------------------------------------------
  # Stage 2: static-checks (clang-format + clang-tidy + SPDX)
  # --------------------------------------------------------------------------
  static-checks:
    name: static-checks
    runs-on: ubuntu-22.04
    needs: build-matrix
    container:
      # Hardcoded literal — GitHub Actions does NOT support the `env`
      # context in `jobs.<id>.container.image` (only github / needs /
      # strategy / matrix / vars / inputs are allowed there). Forks
      # should update both this string and the registry namespace in
      # `.github/workflows/publish-images.yml`. The package MUST be
      # set to public visibility on ghcr.io after the first
      # publish-images run; with public visibility the pull happens
      # anonymously and no `credentials:` block is required.
      image: ghcr.io/koyamanx/nsl-nslc:dev
    steps:
      - uses: actions/checkout@v4

      # Configure + build locally instead of downloading
      # compile_commands.json from the build-matrix job: the JSON
      # produced there has absolute `directory` fields pointing at
      # `/__w/.../build-Release-gcc` (the original cell's path), and
      # clang-tidy `chdir`s into that directory before reading any
      # entry. Cross-job artifact paths can't satisfy that without a
      # rebuild, so do the rebuild here. Mirrors the unit-tests and
      # lowering-tests jobs.
      - name: Configure + build (Release × gcc)
        run: ./scripts/ci.sh build-matrix Release gcc

      - name: Run stage 2 via scripts/ci.sh
        run: ./scripts/ci.sh static-checks

  # --------------------------------------------------------------------------
  # Stage 3: unit-and-layer-tests
  # --------------------------------------------------------------------------
  unit-and-layer-tests:
    name: unit-and-layer-tests
    runs-on: ubuntu-22.04
    needs: build-matrix
    container:
      # Hardcoded literal — GitHub Actions does NOT support the `env`
      # context in `jobs.<id>.container.image` (only github / needs /
      # strategy / matrix / vars / inputs are allowed there). Forks
      # should update both this string and the registry namespace in
      # `.github/workflows/publish-images.yml`. The package MUST be
      # set to public visibility on ghcr.io after the first
      # publish-images run; with public visibility the pull happens
      # anonymously and no `credentials:` block is required.
      image: ghcr.io/koyamanx/nsl-nslc:dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure + build (Release × gcc)
        run: ./scripts/ci.sh build-matrix Release gcc

      - name: Run stage 3 via scripts/ci.sh
        run: ./scripts/ci.sh unit-tests build-Release-gcc

  # --------------------------------------------------------------------------
  # Stage 4: lowering-tests
  # --------------------------------------------------------------------------
  lowering-tests:
    name: lowering-tests
    runs-on: ubuntu-22.04
    needs: build-matrix
    container:
      # Hardcoded literal — GitHub Actions does NOT support the `env`
      # context in `jobs.<id>.container.image` (only github / needs /
      # strategy / matrix / vars / inputs are allowed there). Forks
      # should update both this string and the registry namespace in
      # `.github/workflows/publish-images.yml`. The package MUST be
      # set to public visibility on ghcr.io after the first
      # publish-images run; with public visibility the pull happens
      # anonymously and no `credentials:` block is required.
      image: ghcr.io/koyamanx/nsl-nslc:dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # nsl-opt and nslc invoke MLIR's BuiltinDialect::initialize on
      # every MLIRContext construction. The vendored libMLIR.so under
      # /opt/llvm is built WITHOUT ASan, but its SmallVector inline-
      # storage layout differs from the ASan-instrumented binary's
      # — moving a populated SmallVector across the boundary fires
      # use-after-poison on the destination's poisoned tail.
      # ASAN_OPTIONS=detect_container_overflow=0 doesn't help (the
      # poisoning persists). Build the lit-target binaries without
      # ASan; the unit-tests / build-matrix cells keep full coverage.
      - name: Configure + build (Release × clang, no ASan)
        run: NSL_ENABLE_ASAN=OFF ./scripts/ci.sh build-matrix Release clang

      - name: Run stage 4 via scripts/ci.sh
        run: ./scripts/ci.sh lowering-tests build-Release-clang

  # --------------------------------------------------------------------------
  # Stage 5: end-to-end (wired but empty until M7)
  # --------------------------------------------------------------------------
  end-to-end:
    name: end-to-end
    runs-on: ubuntu-22.04
    needs: build-matrix
    if: false                              # FR-015: skipped until M7 lands
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci.sh e2e

  # --------------------------------------------------------------------------
  # Stage 6: formal (wired but empty until M8)
  # --------------------------------------------------------------------------
  formal:
    name: formal
    runs-on: ubuntu-22.04
    needs: build-matrix
    if: false                              # FR-015: skipped until M8 lands
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci.sh formal

  # --------------------------------------------------------------------------
  # T8 — tree-sitter-nsl.wasm build + upload
  # (specs/010-t8-tree-sitter-grammar/spec.md Q2 → Option C).
  #
  # The WASM artefact is NOT committed; CI builds it on every PR and
  # uploads as a workflow artefact. The `treesitter-wasm-determinism`
  # sub-step in stage 2 (scripts/ci.sh) asserts byte-identity across
  # two consecutive builds (SC-008 / Constitution Principle V).
  #
  # No `container:` block: `tree-sitter build-wasm --docker`
  # internally `docker run`s the emscripten/emsdk image; that needs
  # host-level Docker access which a service container does not
  # expose. Running on the bare ubuntu-22.04 runner gives both
  # Docker and Node out of the box.
  #
  # On tagged commits the artefact is also attached to the GitHub
  # Release via softprops/action-gh-release, so downstream editor
  # consumers (VS Code extension, etc.) can `curl`-fetch a stable
  # URL per release tag.
  # --------------------------------------------------------------------------
  tree-sitter-wasm:
    name: tree-sitter-wasm
    runs-on: ubuntu-22.04
    needs: static-checks
    permissions:
      contents: write                      # for action-gh-release on tag push
    steps:
      - uses: actions/checkout@v4

      - name: Precheck — grammar.js present
        id: precheck
        shell: bash
        run: |
          if [[ -f grammars/treesitter/grammar.js ]]; then
            echo "skip=0" >>"${GITHUB_OUTPUT}"
          else
            echo "skip=1" >>"${GITHUB_OUTPUT}"
            echo "::warning::grammars/treesitter/grammar.js not present; skipping tree-sitter-wasm job"
          fi

      - name: Setup Node.js
        if: steps.precheck.outputs.skip == '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # `npm ci` once package-lock.json lands (T002). Until then,
      # `npm install` reads package.json's `^0.22.0` range and
      # records a fresh lockfile in the workspace (not committed).
      - name: Install tree-sitter-cli
        if: steps.precheck.outputs.skip == '0'
        working-directory: grammars/treesitter
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Generate parser
        if: steps.precheck.outputs.skip == '0'
        working-directory: grammars/treesitter
        run: npx --no-install tree-sitter generate

      - name: Build WASM (--docker)
        if: steps.precheck.outputs.skip == '0'
        working-directory: grammars/treesitter
        run: npx --no-install tree-sitter build-wasm --docker

      - name: Upload tree-sitter-nsl-wasm artefact
        if: steps.precheck.outputs.skip == '0'
        uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-nsl-wasm
          path: grammars/treesitter/tree-sitter-nsl.wasm
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release (on tag push)
        if: steps.precheck.outputs.skip == '0' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: grammars/treesitter/tree-sitter-nsl.wasm

  # --------------------------------------------------------------------------
  # Wired-but-empty sticky comment (research §8). Always runs so
  # reviewers immediately see why stages 5/6 show as skipped.
  # --------------------------------------------------------------------------
  wired-but-empty-comment:
    name: wired-but-empty-comment
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: nslc-wired-but-empty
          message: |
            ### CI: stages 5 & 6 are wired but empty

            - **Stage 5 (end-to-end)** — wired but empty until M7 lands
              (audited-project vendoring P-VEN + golden-VCD P-VCD).
              See `README.md` §Roadmap and Constitution Principle VI.
            - **Stage 6 (formal)** — wired but empty until M8 lands
              (riscv-formal integration).

            These stages MUST report a visible "skipped" status, never
            a green "no tests" pass (FR-015). Adding them to
            `.github/branch-protection.json` `required_status_checks.contexts`
            is a one-line PR at M7 / M8.
