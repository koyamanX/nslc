#
# test/audited/lit.local.cfg — partial exclusion for the audited
# corpus (M7 Phase 4 + 6).
#
# Per `specs/011-m7-driver-e2e/contracts/audited-corpus.contract.md`
# §5, the audited-corpus regression is driven by per-cell `.test`
# files at the top of this directory (one per project × simulator
# tuple — 8 cells at M7 acceptance). Those `.test` files use
# `REQUIRES:` directives to UNSUPPORTED out until the `:dev-m7`
# container ships iverilog + verilator.
#
# The vendored sources under `test/audited/<project>/` are
# *inputs* to those cells, not lit-test files themselves — exclude
# the 4 project subdirectories from auto-discovery so their `.nsl`
# / `.mlir` files are not picked up. The top-level `.test` files
# (e.g., `cpu16_iverilog.test`) remain discoverable.

config.excludes = ['cpu16', 'mips32_single_cycle', 'ahb_lite_nsl', 'turboV']
