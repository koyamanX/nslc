#
# test/audited/lit.local.cfg — exclude the vendored audited-NSL
# corpus from lit's test auto-discovery (M7 Phase 4).
#
# Per `specs/011-m7-driver-e2e/contracts/audited-corpus.contract.md`
# §5, the audited-corpus regression is driven by a custom
# `check-audited` CMake target (lands at T071) — NOT by lit's
# default auto-discovery of `.nsl` files. The vendored sources
# under `test/audited/<project>/` are *inputs* to that
# regression, not lit-test files themselves.
#
# This config tells lit to not descend into this subtree. The
# `check-audited` target invokes `nslc -emit=verilog` over the
# vendored sources explicitly via its own CMake glue.

config.suffixes = ()
config.excludes = ['cpu16', 'mips32_single_cycle', 'ahb_lite_nsl', 'turboV']
