#
# test/Lower/m3_corpus/lit.local.cfg — overrides root-config suffixes
# for the M3-corpus golden tree (T106 / FR-030).
#
# At this layer the only LIT-discoverable fixtures are the per-Sn
# `pass.test` harness files. The paired `pass.expected.mlir` files
# are golden artifacts NOT lit fixtures (they have no RUN line — they
# are diff'd against by their sibling `.test` file). Without this
# override the root config picks up `.mlir` and tries to lit-run the
# goldens, producing UNRESOLVED noise.

config.suffixes = [".test"]
